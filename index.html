<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบทดสอบแม่บ้าน · ร้านสะดวกซัก</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1a1a; --paper:#fafaf7; --soap:#e8f0f5;
  --bubble:#a8d5e2; --foam:#f5f9fb;
  --warm:#d97757; --gold:#d4a574; --sage:#7a9e7e;
  --wrong:#c9533f; --right:#5a8765; --neutral:#6b7280;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;font-weight:400;line-height:1.6}
body{background:radial-gradient(circle at 10% 20%,rgba(168,213,226,.15) 0%,transparent 50%),radial-gradient(circle at 90% 80%,rgba(217,119,87,.08) 0%,transparent 50%),var(--paper)}

.container{max-width:920px;margin:0 auto;padding:24px 20px}
.btn{font-family:inherit;cursor:pointer;border:2px solid var(--ink);background:var(--ink);color:var(--paper);padding:14px 28px;font-size:16px;font-weight:600;border-radius:0;transition:all .2s}
.btn:hover{background:var(--paper);color:var(--ink);transform:translate(-2px,-2px);box-shadow:4px 4px 0 var(--ink)}
.btn-secondary{background:transparent;color:var(--ink)}
.btn-secondary:hover{background:var(--ink);color:var(--paper);transform:translate(-2px,-2px);box-shadow:4px 4px 0 var(--warm)}
.btn-warm{background:var(--warm);border-color:var(--warm);color:var(--paper)}
.btn-warm:hover{background:var(--paper);color:var(--warm)}
.btn-sage{background:var(--sage);border-color:var(--sage);color:var(--paper)}
.btn-sm{padding:8px 14px;font-size:14px}
input,select,textarea{font-family:inherit;font-size:16px;border:2px solid var(--ink);padding:12px 14px;background:var(--paper);width:100%;border-radius:0;transition:all .15s}
input:focus,select:focus{outline:none;background:var(--foam);box-shadow:4px 4px 0 var(--ink);transform:translate(-2px,-2px)}
.label{font-weight:600;display:block;margin-bottom:8px;font-size:14px;letter-spacing:.05em;text-transform:uppercase;color:var(--neutral)}

/* HOME */
.home-hero{padding:60px 0 40px;text-align:center;border-bottom:3px solid var(--ink);position:relative}
.home-hero::after{content:'';position:absolute;bottom:-9px;left:0;right:0;height:3px;background:var(--ink)}
.home-hero h1{font-size:clamp(32px,6vw,52px);font-weight:700;line-height:1.1;letter-spacing:-.02em;margin-bottom:12px}
.home-hero h1 .accent{color:var(--warm);font-style:italic}
.home-hero p{font-size:18px;color:var(--neutral);max-width:540px;margin:0 auto}
.home-hero .ornament{font-size:48px;margin-bottom:20px;display:inline-block;animation:bob 3s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}

.home-cards{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:48px}
@media(max-width:680px){.home-cards{grid-template-columns:1fr}}
.card{border:3px solid var(--ink);background:var(--paper);padding:36px 28px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.card:hover{transform:translate(-4px,-4px);box-shadow:8px 8px 0 var(--ink)}
.card.warm:hover{box-shadow:8px 8px 0 var(--warm)}
.card.sage:hover{box-shadow:8px 8px 0 var(--sage)}
.card .num{font-size:14px;font-weight:600;color:var(--neutral);letter-spacing:.15em}
.card h2{font-size:28px;font-weight:700;margin:8px 0 16px;letter-spacing:-.01em}
.card p{font-size:15px;color:var(--neutral);line-height:1.5}
.card .arrow{position:absolute;top:24px;right:24px;font-size:28px;transition:transform .2s}
.card:hover .arrow{transform:translateX(6px)}

.stats-strip{display:flex;justify-content:space-around;align-items:center;padding:32px 0;margin-top:48px;border-top:2px dashed var(--ink);border-bottom:2px dashed var(--ink);flex-wrap:wrap;gap:16px}
.stat-item{text-align:center}
.stat-num{font-size:36px;font-weight:700;color:var(--warm);line-height:1}
.stat-label{font-size:13px;color:var(--neutral);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}

/* EXAM */
.exam-header{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:2px solid var(--ink);margin-bottom:24px;flex-wrap:wrap;gap:12px}
.exam-header .info{font-weight:600;font-size:15px}
.exam-header .info span{color:var(--warm)}
.timer{font-weight:600;font-size:18px;background:var(--ink);color:var(--paper);padding:6px 14px}

.progress-track{height:8px;background:var(--soap);border:2px solid var(--ink);margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:repeating-linear-gradient(45deg,var(--warm),var(--warm) 8px,#e08566 8px,#e08566 16px);transition:width .4s ease}

.q-card{border:3px solid var(--ink);background:var(--paper);padding:32px;margin-bottom:20px;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.q-meta{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.tag{display:inline-block;font-size:12px;font-weight:600;padding:4px 10px;letter-spacing:.05em;text-transform:uppercase;border:2px solid var(--ink)}
.tag-easy{background:#d4eed5;color:#2d5a30}
.tag-med{background:#fce5b5;color:#7a5a1e}
.tag-hard{background:#f8c8bf;color:#7a2d1e}
.tag-cat{background:var(--soap);color:var(--ink)}
.q-text{font-size:20px;font-weight:500;line-height:1.5;margin-bottom:24px}
.q-num{color:var(--warm);font-weight:700}

.choices{display:grid;gap:12px}
.choice{border:2px solid var(--ink);padding:16px 20px;cursor:pointer;background:var(--paper);transition:all .15s;display:flex;gap:14px;align-items:flex-start;font-size:16px;line-height:1.4;text-align:left;font-family:inherit;width:100%}
.choice:hover{background:var(--foam);transform:translate(-2px,-2px);box-shadow:4px 4px 0 var(--ink)}
.choice.selected{background:var(--ink);color:var(--paper)}
.choice.selected .ck{background:var(--paper);color:var(--ink)}
.ck{flex-shrink:0;width:32px;height:32px;border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;background:var(--paper);color:var(--ink)}

.exam-nav{display:flex;justify-content:space-between;gap:12px;margin-top:24px;flex-wrap:wrap}
.exam-nav .left{display:flex;gap:12px;flex-wrap:wrap}

/* RESULT */
.result-card{border:4px solid var(--ink);padding:48px 32px;text-align:center;background:var(--paper);margin-top:24px;position:relative}
.result-card::before{content:'';position:absolute;inset:8px;border:1px solid var(--ink);pointer-events:none}
.score-display{font-size:96px;font-weight:700;line-height:1;color:var(--ink);margin-bottom:8px;letter-spacing:-.04em}
.score-display .of{font-size:32px;color:var(--neutral);font-weight:400}
.score-percent{font-size:24px;font-weight:600;color:var(--warm);margin-bottom:24px}
.grade-badge{display:inline-block;padding:8px 20px;border:3px solid var(--ink);font-weight:700;font-size:18px;margin-bottom:16px;letter-spacing:.05em}
.grade-A{background:var(--sage);color:#fff}
.grade-B{background:var(--bubble);color:var(--ink)}
.grade-C{background:var(--gold);color:var(--ink)}
.grade-D{background:var(--warm);color:#fff}
.grade-F{background:var(--wrong);color:#fff}
.result-msg{font-size:17px;color:var(--neutral);max-width:500px;margin:0 auto 24px;line-height:1.6}
.cat-breakdown{margin-top:32px;text-align:left}
.cat-breakdown h3{margin-bottom:12px;font-size:16px;letter-spacing:.05em;text-transform:uppercase;color:var(--neutral);border-bottom:2px solid var(--ink);padding-bottom:6px}
.cat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed var(--ink)}
.cat-row:last-child{border-bottom:none}
.cat-row .name{font-weight:600}
.cat-row .score{font-family:monospace;font-weight:600}

/* OWNER */
.owner-shell{background:var(--paper);min-height:100vh}
.owner-header{background:var(--ink);color:var(--paper);padding:24px 0;border-bottom:4px solid var(--warm)}
.owner-header h1{font-size:24px;font-weight:700}
.owner-header .sub{font-size:13px;color:var(--bubble);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
.owner-tabs{display:flex;gap:0;border-bottom:2px solid var(--ink);margin-bottom:24px;overflow-x:auto}
.owner-tab{padding:14px 24px;border:none;background:transparent;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;border-bottom:4px solid transparent;color:var(--neutral);white-space:nowrap}
.owner-tab.active{color:var(--ink);border-bottom-color:var(--warm)}
.owner-tab:hover{color:var(--ink)}

.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.metric{border:2px solid var(--ink);padding:20px;background:var(--paper)}
.metric .lbl{font-size:12px;color:var(--neutral);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.metric .val{font-size:32px;font-weight:700;line-height:1}
.metric .sub{font-size:13px;color:var(--neutral);margin-top:4px}

.history-list{display:grid;gap:12px}
.history-item{border:2px solid var(--ink);padding:16px 20px;display:grid;grid-template-columns:1fr auto auto auto;gap:16px;align-items:center;background:var(--paper)}
@media(max-width:680px){.history-item{grid-template-columns:1fr 1fr}}
.history-item .name{font-weight:600;font-size:16px}
.history-item .date{font-size:13px;color:var(--neutral)}
.history-item .score{font-family:monospace;font-weight:700;font-size:18px}
.history-item .grade{font-size:13px;font-weight:600;padding:4px 10px;border:2px solid var(--ink)}
.history-item button{padding:8px 14px;font-size:14px;background:transparent;border:2px solid var(--ink);color:var(--ink);font-family:inherit;cursor:pointer;font-weight:600}
.history-item button:hover{background:var(--ink);color:var(--paper)}

.detail-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;padding:24px;z-index:1000;overflow-y:auto}
.detail-modal .box{background:var(--paper);max-width:900px;width:100%;border:4px solid var(--ink);padding:32px;margin-top:24px}
.detail-q{border:2px solid var(--ink);padding:20px;margin-bottom:16px}
.detail-q.correct{background:#e9f3ea;border-color:var(--right)}
.detail-q.wrong{background:#fbe7e3;border-color:var(--wrong)}
.detail-q .head{display:flex;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.detail-q .text{font-weight:500;font-size:16px;margin-bottom:12px}
.detail-q .ch{font-size:14px;padding:8px 12px;margin:4px 0;border:1px solid #ccc}
.detail-q .ch.user-pick{border:2px solid var(--wrong);background:rgba(201,83,63,.1);font-weight:600}
.detail-q .ch.correct-ans{border:2px solid var(--right);background:rgba(90,135,101,.15);font-weight:600}
.detail-q .ch.user-correct{border:2px solid var(--right);background:rgba(90,135,101,.2);font-weight:600}
.detail-q .explain{margin-top:12px;padding:12px;background:var(--soap);border-left:4px solid var(--warm);font-size:14px;line-height:1.5}

.weak-list{display:grid;gap:10px}
.weak-item{border:2px solid var(--ink);padding:14px 18px;background:var(--paper)}
.weak-item summary{display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;cursor:pointer;list-style:none}
.weak-item summary::-webkit-details-marker{display:none}
.weak-item .qid{font-family:monospace;font-weight:700;color:var(--warm);font-size:18px}
.weak-item .qq{font-size:14px;line-height:1.4}
.weak-item .ct{font-size:13px;font-weight:700;background:var(--wrong);color:#fff;padding:4px 10px;font-family:monospace}

/* TREND CHART */
.trend-card{border:2px solid var(--ink);padding:24px;background:var(--paper);margin-bottom:16px}
.trend-card h3{font-size:18px;margin-bottom:16px}
.trend-chart{height:140px;position:relative;border-bottom:2px solid var(--ink);border-left:2px solid var(--ink);padding:8px 0;display:flex;align-items:flex-end;gap:6px;overflow-x:auto}
.trend-bar{flex:1;min-width:24px;background:var(--warm);position:relative;transition:all .2s;cursor:pointer}
.trend-bar:hover{background:var(--ink)}
.trend-bar.pass{background:var(--sage)}
.trend-bar.pass:hover{background:var(--ink)}
.trend-bar .lbl{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);font-size:11px;font-weight:600;padding:2px 4px;white-space:nowrap}
.trend-axis{display:flex;justify-content:space-between;font-size:11px;color:var(--neutral);margin-top:4px}

/* PASSWORD */
.pw-modal{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;padding:24px;z-index:2000}
.pw-modal .box{max-width:420px;width:100%;background:var(--paper);padding:48px 36px;text-align:center;position:relative}
.pw-modal .box::before{content:'';position:absolute;inset:8px;border:1px solid var(--ink);pointer-events:none}
.pw-modal h2{font-size:24px;font-weight:700;margin-bottom:8px}
.pw-modal p{color:var(--neutral);margin-bottom:24px;font-size:14px}
.pw-modal input{margin-bottom:16px;text-align:center;font-size:18px;letter-spacing:.2em}
.pw-error{color:var(--wrong);font-weight:600;font-size:14px;margin-top:8px;min-height:20px}

.empty-state{text-align:center;padding:60px 20px;color:var(--neutral)}
.empty-state .ico{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:16px}

.flash{padding:14px 18px;margin:16px 0;border:2px solid var(--ink);font-size:14px;font-weight:500}
.flash-warn{background:#fff7e0;border-color:var(--gold)}
.flash-info{background:var(--foam);border-color:var(--bubble)}

.review-toggle{cursor:pointer;font-weight:600;font-size:14px;text-decoration:underline;color:var(--neutral)}
.hidden{display:none !important}
.small{font-size:13px;color:var(--neutral)}
.center{text-align:center}
.mt{margin-top:16px}
.mt-l{margin-top:32px}
.row-gap{display:flex;gap:12px;flex-wrap:wrap;align-items:center}

.bubbles{position:fixed;bottom:0;left:0;right:0;height:120px;pointer-events:none;z-index:0;overflow:hidden;opacity:.4}
.bubble{position:absolute;border-radius:50%;background:var(--bubble);bottom:-50px;animation:rise 8s ease-in infinite}
@keyframes rise{0%{transform:translateY(0);opacity:0}10%{opacity:.6}90%{opacity:.4}100%{transform:translateY(-300px);opacity:0}}
</style>
</head>

<script>
// ====== โหลดข้อสอบ ======
const QUESTIONS = JSON.parse(document.getElementById('qdata').textContent);

const CONFIG = {
  EASY: 25, MED: 15, HARD: 10,
  POINT: { 'ง่าย':1, 'ปานกลาง':2, 'ยาก':4.5 },
  TOTAL: 100,
  PASS: 70,
  OWNER_PW: '1303'
};

let state = { page:'home', exam:null, ownerView:'overview' };

// ====== STORAGE (Google Sheets ผ่าน Apps Script) ======
// ใส่ URL ของ Apps Script ที่นี่ (จะได้รับหลังจาก Deploy as Web app)
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwOiaIQ3olJ22DgtUjKwTgxAkIl0fCuu2gPY6OlcVmwaZC3zVQEm5bO9NMpjAEGdVd4AQ/exec';

let _cache = null; // cache ผลลัพธ์ในหน่วยความจำ ลด API call
let _cacheTime = 0;
const CACHE_MS = 5000; // cache 5 วินาที

async function saveResult(r){
  if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL.indexOf('__APPS')===0){
    alert('⚠️ ยังไม่ได้ตั้งค่า Google Sheets — กรุณาแก้ตัวแปร APPS_SCRIPT_URL ในไฟล์ HTML ก่อน');
    return false;
  }
  try{
    // ส่งแบบ no-cors เพื่อหลีกเลี่ยง CORS preflight
    const res = await fetch(APPS_SCRIPT_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({action:'save', data: r})
    });
    _cache = null; // เคลียร์ cache เพื่อโหลดใหม่
    return true;
  }catch(e){
    console.error('saveResult error', e);
    alert('⚠️ ส่งข้อมูลไป Google Sheets ไม่สำเร็จ\n' + e.message);
    return false;
  }
}

async function loadAll(){
  // ใช้ cache
  if(_cache && (Date.now() - _cacheTime) < CACHE_MS) return _cache;
  
  if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL.indexOf('__APPS')===0){
    return [];
  }
  try{
    const res = await fetch(APPS_SCRIPT_URL + '?action=list&t=' + Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    if(!Array.isArray(data)) return [];
    // เรียงล่าสุดก่อน
    data.sort((a,b) => b.finishedAt - a.finishedAt);
    _cache = data;
    _cacheTime = Date.now();
    return data;
  }catch(e){
    console.error('loadAll error', e);
    return [];
  }
}

async function delResult(id){
  if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL.indexOf('__APPS')===0) return;
  try{
    await fetch(APPS_SCRIPT_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({action:'delete', id: id})
    });
    _cache = null;
  }catch(e){
    console.error('delResult error', e);
  }
}

// ====== HELPERS ======
function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function pickQs(){
  const e=QUESTIONS.filter(q=>q.difficulty==='ง่าย');
  const m=QUESTIONS.filter(q=>q.difficulty==='ปานกลาง');
  const h=QUESTIONS.filter(q=>q.difficulty==='ยาก');
  return shuffle([
    ...shuffle(e).slice(0,CONFIG.EASY),
    ...shuffle(m).slice(0,CONFIG.MED),
    ...shuffle(h).slice(0,CONFIG.HARD)
  ]);
}
function fmtDate(ts){
  const d=new Date(ts);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()+543} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`
}
function fmtDateShort(ts){
  const d=new Date(ts);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${(d.getFullYear()+543)%100}`
}
function fmtDur(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60);return `${m}:${String(s%60).padStart(2,'0')}`}
function calcGrade(p){
  if(p>=85)return{l:'A',label:'ยอดเยี่ยม'};
  if(p>=75)return{l:'B',label:'ดี'};
  if(p>=65)return{l:'C',label:'พอใช้'};
  if(p>=50)return{l:'D',label:'ต้องปรับปรุง'};
  return{l:'F',label:'ต้องเรียนใหม่'}
}
function gradeBg(l){return l==='A'?'var(--sage)':l==='B'?'var(--bubble)':l==='C'?'var(--gold)':l==='D'?'var(--warm)':'var(--wrong)'}
function gradeFg(l){return (l==='B'||l==='C')?'var(--ink)':'#fff'}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}

const $=id=>document.getElementById(id);
const app=()=>$('app');

function render(){
  const r=app();
  if(state.page==='home') return rHome(r);
  if(state.page==='exam-start') return rStart(r);
  if(state.page==='exam-run') return rRun(r);
  if(state.page==='exam-result') return rResult(r);
  if(state.page==='owner-login') return rLogin(r);
  if(state.page==='owner') return rOwner(r);
}

function startExam(){
  const name=$('hk-name').value.trim();
  const branch=$('hk-branch').value;
  if(!name){alert('กรุณากรอกชื่อก่อน');return}
  const qs=pickQs();
  state.exam={housekeeper:name,branch,questions:qs,answers:new Array(qs.length).fill(null),current:0,startedAt:Date.now()};
  state.page='exam-run';render();
}

// === EXAM RUN ===
function rRun(root){
  const e=state.exam;
  const q=e.questions[e.current];
  const total=e.questions.length;
  const ansd=e.answers.filter(a=>a!==null).length;
  const prog=((e.current+1)/total)*100;
  const dc=q.difficulty==='ง่าย'?'tag-easy':q.difficulty==='ปานกลาง'?'tag-med':'tag-hard';
  root.innerHTML=`
  <div class="container">
    <div class="exam-header">
      <div class="info">${esc(e.housekeeper)} <span>/ ${e.branch}</span></div>
      <div class="row-gap">
        <span class="small">ตอบแล้ว <strong>${ansd}/${total}</strong></span>
        <span class="timer" id="timer">0:00</span>
      </div>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${prog}%"></div></div>
    <div class="q-card">
      <div class="q-meta">
        <span class="tag tag-cat">${esc(q.category)}</span>
        <span class="tag ${dc}">${q.difficulty}</span>
      </div>
      <div class="q-text"><span class="q-num">ข้อ ${e.current+1}/${total}</span> ${esc(q.q)}</div>
      <div class="choices">
        ${q.choices.map((c,i)=>`<button class="choice ${e.answers[e.current]===i?'selected':''}" onclick="pick(${i})"><span class="ck">${'กขคง'[i]}</span><span>${esc(c)}</span></button>`).join('')}
      </div>
    </div>
    <div class="exam-nav">
      <div class="left">
        <button class="btn btn-secondary" onclick="prev()" ${e.current===0?'disabled style="opacity:.4"':''}>← ก่อนหน้า</button>
        <button class="btn btn-secondary" onclick="next()" ${e.current===total-1?'disabled style="opacity:.4"':''}>ถัดไป →</button>
      </div>
      <button class="btn btn-warm" onclick="submit()">ส่งข้อสอบ</button>
    </div>
    <p class="small center mt">📌 ข้ามข้อแล้วกลับมาทำใหม่ได้ — กดส่งข้อสอบเมื่อพร้อม</p>
  </div>`;
  if(window.__t)clearInterval(window.__t);
  window.__t=setInterval(()=>{const t=$('timer');if(t)t.textContent=fmtDur(Date.now()-e.startedAt)},1000);
}
function pick(i){state.exam.answers[state.exam.current]=i;render()}
function prev(){if(state.exam.current>0){state.exam.current--;render()}}
function next(){if(state.exam.current<state.exam.questions.length-1){state.exam.current++;render()}}

async function submit(){
  const e=state.exam;
  const un=e.answers.filter(a=>a===null).length;
  if(un>0){if(!confirm(`ยังเหลืออีก ${un} ข้อที่ยังไม่ตอบ ส่งเลยหรือไม่?\n(ข้อที่ไม่ตอบจะนับเป็นผิด)`))return}
  if(window.__t)clearInterval(window.__t);
  let total=0;
  const det=[],cs={};
  e.questions.forEach((q,i)=>{
    const ua=e.answers[i],corr=ua===q.answer,pts=corr?CONFIG.POINT[q.difficulty]:0;
    total+=pts;
    det.push({qid:q.id,q:q.q,choices:q.choices,correctIdx:q.answer,userIdx:ua,correct:corr,points:pts,maxPoints:CONFIG.POINT[q.difficulty],category:q.category,difficulty:q.difficulty,explain:q.explain});
    if(!cs[q.category])cs[q.category]={correct:0,total:0,pts:0,maxPts:0};
    cs[q.category].total++;cs[q.category].maxPts+=CONFIG.POINT[q.difficulty];
    if(corr){cs[q.category].correct++;cs[q.category].pts+=CONFIG.POINT[q.difficulty]}
  });
  const r={
    id:'r_'+Date.now()+'_'+Math.random().toString(36).slice(2,8),
    housekeeper:e.housekeeper,branch:e.branch,
    startedAt:e.startedAt,finishedAt:Date.now(),duration:Date.now()-e.startedAt,
    totalScore:Math.round(total*10)/10,maxScore:CONFIG.TOTAL,
    pct:Math.round((total/CONFIG.TOTAL)*1000)/10,
    correctCount:det.filter(d=>d.correct).length,totalCount:det.length,
    catStats:cs,details:det
  };
  // แสดง loading
  app().innerHTML = `<div class="container"><div style="text-align:center;padding:80px 20px"><div style="font-size:48px;margin-bottom:16px">📤</div><h2>กำลังส่งคำตอบ...</h2><p class="small mt">กรุณารอสักครู่ ระบบกำลังบันทึกผลไป Google Sheets</p></div></div>`;
  
  await saveResult(r);
  state.exam.result=r;
  state.page='exam-result';render();
}

// === RESULT ===
function rResult(root){
  const r=state.exam.result;
  const g=calcGrade(r.pct),pass=r.pct>=CONFIG.PASS;

  if(r.pct>=85)msg='ยอดเยี่ยมมาก! รู้คู่มือแม่นเป็นอย่างดี';
  else if(r.pct>=75)msg='ดีมาก! มีจุดเล็กๆ ที่อาจกลับไปทบทวนเพิ่ม';
  else if(r.pct>=65)msg='พอใช้ได้ แนะนำกลับไปอ่านคู่มือเพิ่มในจุดที่ตอบผิด';

  else msg='ต้องเรียนใหม่ให้เข้าใจ ขอให้ดูคู่มือใหม่ทั้งหมดก่อน';
  root.innerHTML=`
  <div class="container">
    <div class="exam-header">
      <div class="info">${esc(r.housekeeper)} / ${r.branch}</div>
      <div class="small">เสร็จสิ้น ${fmtDate(r.finishedAt)} · ใช้เวลา ${fmtDur(r.duration)}</div>
    </div>
    <div class="result-card">
      <div class="grade-badge grade-${g.l}">เกรด ${g.l} · ${g.label}</div>
      <div class="score-display">${r.totalScore}<span class="of">/${r.maxScore}</span></div>
      <div class="score-percent">${r.pct}% · ตอบถูก ${r.correctCount}/${r.totalCount} ข้อ</div>
      <div class="result-msg">${msg}</div>
      <div class="flash ${pass?'flash-info':'flash-warn'}" style="margin:24px auto 0;max-width:480px;text-align:left">
        ${pass?'✅ <strong>ผ่านเกณฑ์</strong> (เกณฑ์ผ่าน '+CONFIG.PASS+' คะแนน)':'⚠️ <strong>ยังไม่ผ่านเกณฑ์</strong> (ต้องการ '+CONFIG.PASS+' คะแนน) — ขอให้ทบทวนคู่มือและสอบใหม่'}
      </div>
      <div class="cat-breakdown">
        <h3>คะแนนแยกตามหมวด</h3>
        ${Object.entries(r.catStats).map(([cat,s])=>{const p=Math.round((s.pts/s.maxPts)*100);return `<div class="cat-row"><span class="name">${esc(cat)}</span><span class="score">${s.pts.toFixed(1)}/${s.maxPts.toFixed(1)} (${p}%)</span></div>`}).join('')}
      </div>
    </div>
    <div class="row-gap mt-l center" style="justify-content:center">
      <button class="btn" onclick="goHome()">กลับหน้าหลัก</button>
      <button class="btn btn-secondary" onclick="state.page='exam-start';render()">ทำข้อสอบใหม่</button>
    </div>
    <p class="small center mt-l">บันทึกผลการสอบเรียบร้อยแล้ว · เจ้าของร้านสามารถเข้าดูรายละเอียดและเฉลยได้ในหน้าผู้ดูแล</p>
  </div>`
}

function setV(v){
  state.ownerView=v;
  const c=$('owner-content');
  if(c) c.innerHTML=`<div class="empty-state"><div class="ico">⏳</div><p>กำลังโหลด...</p></div>`;
  loadAll().then(all=>{
    const sub=$('owner-sub');
    if(sub) sub.textContent = `ระบบทดสอบแม่บ้าน · ${all.length} การสอบในระบบ`;
    rContent(all);
  });
  // อัพเดท tab active
  document.querySelectorAll('.owner-tab').forEach(t=>t.classList.remove('active'));
  event?.target?.classList.add('active');
}
async function refreshOwner(){
  _cache = null;
  const c=$('owner-content');
  if(c) c.innerHTML=`<div class="empty-state"><div class="ico">⏳</div><p>กำลังรีเฟรชข้อมูล...</p></div>`;
  const all = await loadAll();
  const sub=$('owner-sub');
  if(sub) sub.textContent = `ระบบทดสอบแม่บ้าน · ${all.length} การสอบในระบบ · อัพเดทล่าสุด ${new Date().toLocaleTimeString('th-TH')}`;
  rContent(all);
}

function rContent(all){
  const c=$('owner-content');if(!c)return;
  const v=state.ownerView;
  if(all.length===0){
    c.innerHTML=`<div class="empty-state"><div class="ico">📭</div><p>ยังไม่มีข้อมูลการสอบในระบบ</p><p class="small mt">รอแม่บ้านทำข้อสอบ ผลจะแสดงที่นี่</p></div>`;
    return;
  }
  if(v==='overview')return rOverview(c,all);
  if(v==='history')return rHistory(c,all);
  if(v==='weak')return rWeak(c,all);
  if(v==='persons')return rPersons(c,all);
}

function rOverview(c,all){
  const total=all.length;
  const avg=(all.reduce((s,r)=>s+r.pct,0)/total).toFixed(1);
  const passed=all.filter(r=>r.pct>=CONFIG.PASS).length;
  const passRate=Math.round((passed/total)*100);
  const top=all.slice().sort((a,b)=>b.pct-a.pct)[0];
  const hkSet=new Set(all.map(r=>r.housekeeper+'|'+r.branch));
  
  // recent 7 days
  const now=Date.now(),weekAgo=now-7*86400000;
  const recent=all.filter(r=>r.finishedAt>=weekAgo);
  
  // cat
  const catAgg={};
  all.forEach(r=>Object.entries(r.catStats).forEach(([k,s])=>{
    if(!catAgg[k])catAgg[k]={pts:0,maxPts:0};
    catAgg[k].pts+=s.pts;catAgg[k].maxPts+=s.maxPts;
  }));
  // branch
  const bAgg={};
  all.forEach(r=>{
    if(!bAgg[r.branch])bAgg[r.branch]={sum:0,count:0,pass:0};
    bAgg[r.branch].sum+=r.pct;bAgg[r.branch].count++;
    if(r.pct>=CONFIG.PASS)bAgg[r.branch].pass++;
  });
  
  c.innerHTML=`
  <div class="metric-grid">
    <div class="metric"><div class="lbl">การสอบทั้งหมด</div><div class="val">${total}</div><div class="sub">ครั้ง · 7 วันล่าสุด ${recent.length}</div></div>
    <div class="metric"><div class="lbl">แม่บ้าน</div><div class="val">${hkSet.size}</div><div class="sub">คน</div></div>
    <div class="metric"><div class="lbl">คะแนนเฉลี่ย</div><div class="val">${avg}%</div><div class="sub">จาก 100</div></div>
    <div class="metric"><div class="lbl">อัตราผ่าน</div><div class="val">${passRate}%</div><div class="sub">${passed}/${total} ครั้ง</div></div>
  </div>
  <h3 style="margin:24px 0 12px;font-size:16px;letter-spacing:.05em;text-transform:uppercase;color:var(--neutral);border-bottom:2px solid var(--ink);padding-bottom:6px">คะแนนเฉลี่ยรายหมวด</h3>
  <div class="metric-grid">
    ${Object.entries(catAgg).map(([cat,s])=>{const p=Math.round((s.pts/s.maxPts)*100);const col=p>=75?'var(--sage)':p>=60?'var(--gold)':'var(--warm)';return `<div class="metric"><div class="lbl">${esc(cat)}</div><div class="val" style="color:${col}">${p}%</div></div>`}).join('')}
  </div>
  <h3 style="margin:24px 0 12px;font-size:16px;letter-spacing:.05em;text-transform:uppercase;color:var(--neutral);border-bottom:2px solid var(--ink);padding-bottom:6px">คะแนนเฉลี่ยรายสาขา</h3>
  <div class="metric-grid">
    ${Object.entries(bAgg).map(([b,s])=>{const a=(s.sum/s.count).toFixed(1);return `<div class="metric"><div class="lbl">${esc(b)}</div><div class="val">${a}%</div><div class="sub">${s.count} ครั้ง · ผ่าน ${s.pass}/${s.count}</div></div>`}).join('')}
  </div>
  ${top?`<div class="flash flash-info mt-l">🏆 <strong>คะแนนสูงสุด:</strong> ${esc(top.housekeeper)} (${top.branch}) — ${top.totalScore} คะแนน (${top.pct}%) เมื่อ ${fmtDate(top.finishedAt)}</div>`:''}`;
}

function rHistory(c,all){
  c.innerHTML=`
  <div class="flash flash-info">📋 ประวัติการสอบทั้งหมด เรียงจากล่าสุด — กดดูรายละเอียดเพื่อเห็นเฉลยรายข้อและคำอธิบาย</div>
  <div class="history-list">
    ${all.map(r=>{
      const g=calcGrade(r.pct),pass=r.pct>=CONFIG.PASS;
      return `<div class="history-item">
        <div>
          <div class="name">${esc(r.housekeeper)} <span class="small" style="font-weight:400">/ ${r.branch}</span></div>
          <div class="date">${fmtDate(r.finishedAt)} · ${fmtDur(r.duration)} · ตอบถูก ${r.correctCount}/${r.totalCount}</div>
        </div>
        <div class="score" style="color:${pass?'var(--right)':'var(--wrong)'}">${r.totalScore}/${r.maxScore}</div>
        <div class="grade grade-${g.l}" style="background:${gradeBg(g.l)};color:${gradeFg(g.l)}">${g.l}</div>
        <div style="display:flex;gap:8px">
          <button onclick="showDetail('${r.id}')">รายละเอียด</button>
          <button onclick="confirmDel('${r.id}')" title="ลบ">🗑</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

async function showDetail(id){
  const all=await loadAll();
  const r=all.find(x=>x.id===id);
  if(!r)return;
  const wrongs=r.details.filter(d=>!d.correct);
  const corrects=r.details.filter(d=>d.correct);
  const m=document.createElement('div');
  m.id='modal-host';
  m.innerHTML=`
  <div class="detail-modal" onclick="if(event.target===this)closeDetail()">
    <div class="box">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:12px">
        <div>
          <h2 style="font-size:22px">${esc(r.housekeeper)} / ${r.branch}</h2>
          <p class="small">${fmtDate(r.finishedAt)} · ใช้เวลา ${fmtDur(r.duration)}</p>
        </div>
        <button class="btn btn-secondary" onclick="closeDetail()">ปิด ✕</button>
      </div>
      <div class="metric-grid">
        <div class="metric"><div class="lbl">คะแนน</div><div class="val">${r.totalScore}/${r.maxScore}</div><div class="sub">${r.pct}%</div></div>
        <div class="metric"><div class="lbl">ตอบถูก</div><div class="val" style="color:var(--right)">${corrects.length}</div><div class="sub">จาก ${r.details.length} ข้อ</div></div>
        <div class="metric"><div class="lbl">ตอบผิด</div><div class="val" style="color:var(--wrong)">${wrongs.length}</div><div class="sub">ข้อ</div></div>
      </div>
      <h3 style="margin:24px 0 12px;font-size:16px;border-bottom:2px solid var(--wrong);padding-bottom:6px">❌ ข้อที่ตอบผิด (${wrongs.length} ข้อ)</h3>
      ${wrongs.length===0?'<p class="small">— ไม่มีข้อที่ตอบผิด —</p>':wrongs.map(d=>renderDQ(d,false)).join('')}
      <h3 style="margin:24px 0 12px;font-size:16px;border-bottom:2px solid var(--right);padding-bottom:6px">
        ✅ ข้อที่ตอบถูก (${corrects.length} ข้อ)
        <span class="review-toggle" onclick="document.getElementById('clist').classList.toggle('hidden')" style="float:right">แสดง/ซ่อน</span>
      </h3>
      <div id="clist" class="hidden">${corrects.map(d=>renderDQ(d,true)).join('')}</div>
    </div>
  </div>`;
  document.body.appendChild(m);
}
function closeDetail(){$('modal-host')?.remove()}

function renderDQ(d,corr){
  const lt=['ก','ข','ค','ง'];
  return `<div class="detail-q ${corr?'correct':'wrong'}">
    <div class="head">
      <span class="tag tag-cat">${esc(d.category)}</span>
      <span class="tag ${d.difficulty==='ง่าย'?'tag-easy':d.difficulty==='ปานกลาง'?'tag-med':'tag-hard'}">${d.difficulty}</span>
      <span class="small">ข้อ #${d.qid} · ${d.points}/${d.maxPoints} คะแนน</span>
    </div>
    <div class="text">${esc(d.q)}</div>
    ${d.choices.map((c,i)=>{
      let cls='ch';
      if(i===d.correctIdx&&i===d.userIdx)cls+=' user-correct';
      else if(i===d.correctIdx)cls+=' correct-ans';
      else if(i===d.userIdx)cls+=' user-pick';
      return `<div class="${cls}"><strong>${lt[i]}.</strong> ${esc(c)}${i===d.correctIdx?' <span style="color:var(--right);font-size:12px;font-weight:700">✓ เฉลย</span>':''}${i===d.userIdx&&i!==d.correctIdx?' <span style="color:var(--wrong);font-size:12px;font-weight:700">← ตอบ</span>':''}${i===d.userIdx&&i===d.correctIdx?' <span style="color:var(--right);font-size:12px;font-weight:700">← ตอบ</span>':''}</div>`;
    }).join('')}
    ${d.userIdx===null?'<div class="ch" style="color:var(--neutral);font-style:italic">— ไม่ได้ตอบข้อนี้ —</div>':''}
    <div class="explain"><strong>📘 คำอธิบาย:</strong> ${esc(d.explain)}</div>
  </div>`;
}

async function confirmDel(id){
  if(!confirm('ลบผลการสอบนี้? (ลบแล้วไม่สามารถกู้คืนได้)'))return;
  await delResult(id);
  loadAll().then(rContent);
}

function rWeak(c,all){
  const stats={};
  all.forEach(r=>r.details.forEach(d=>{
    if(!stats[d.qid])stats[d.qid]={qid:d.qid,q:d.q,category:d.category,difficulty:d.difficulty,wrong:0,total:0,choices:d.choices,correctIdx:d.correctIdx,explain:d.explain};
    stats[d.qid].total++;
    if(!d.correct)stats[d.qid].wrong++;
  }));
  const list=Object.values(stats).filter(s=>s.wrong>0).sort((a,b)=>(b.wrong/b.total)-(a.wrong/a.total)||b.wrong-a.wrong);
  if(list.length===0){c.innerHTML=`<div class="empty-state"><div class="ico">🎉</div><p>ไม่มีข้อที่ตอบผิดเลย!</p></div>`;return}
  c.innerHTML=`
  <div class="flash flash-warn">⚠️ ข้อที่แม่บ้านตอบผิดบ่อย — ใช้สำหรับการอบรมเพิ่มเติม (เรียงตามอัตราตอบผิด)</div>
  <div class="weak-list">
    ${list.map(s=>{
      const p=Math.round((s.wrong/s.total)*100);
      return `<details class="weak-item">
        <summary>
          <span class="qid">#${s.qid}</span>
          <div>
            <div class="qq"><strong>${esc(s.category)}</strong> · ${s.difficulty}</div>
            <div class="qq" style="margin-top:4px">${esc(s.q)}</div>
          </div>
          <span class="ct">${s.wrong}/${s.total} (${p}%)</span>
        </summary>
        <div style="margin-top:12px;padding-top:12px;border-top:1px dashed var(--ink)">
          ${s.choices.map((ch,i)=>`<div class="ch ${i===s.correctIdx?'correct-ans':''}"><strong>${'กขคง'[i]}.</strong> ${esc(ch)} ${i===s.correctIdx?'<span style="color:var(--right);font-weight:700">✓ เฉลย</span>':''}</div>`).join('')}
          <div class="explain"><strong>📘 คำอธิบาย:</strong> ${esc(s.explain)}</div>
        </div>
      </details>`;
    }).join('')}
  </div>`;
}

function rPersons(c,all){
  const p={};
  all.forEach(r=>{
    const k=r.housekeeper+'|'+r.branch;
    if(!p[k])p[k]={name:r.housekeeper,branch:r.branch,results:[]};
    p[k].results.push(r);
  });
  const list=Object.values(p).map(x=>{
    const sum=x.results.reduce((a,r)=>a+r.pct,0);
    const avg=sum/x.results.length;
    const best=Math.max(...x.results.map(r=>r.pct));
    const sorted=x.results.slice().sort((a,b)=>b.finishedAt-a.finishedAt);
    return {...x,avg,best,last:sorted[0],count:x.results.length,sortedResults:sorted};
  }).sort((a,b)=>b.avg-a.avg);
  c.innerHTML=`
  <div class="flash flash-info">👥 รายชื่อแม่บ้านและสถิติการสอบ — กดดูประวัติเพื่อเห็นทุกครั้งที่สอบ</div>
  <div class="history-list">
    ${list.map((x,i)=>{
      const g=calcGrade(x.avg);
      return `<div class="history-item">
        <div>
          <div class="name">${esc(x.name)} <span class="small" style="font-weight:400">/ ${x.branch}</span></div>
          <div class="date">สอบ ${x.count} ครั้ง · เฉลี่ย ${x.avg.toFixed(1)}% · สูงสุด ${x.best.toFixed(1)}% · ล่าสุด ${fmtDateShort(x.last.finishedAt)}</div>
        </div>
        <div class="score">${x.avg.toFixed(0)}%</div>
        <div class="grade grade-${g.l}" style="background:${gradeBg(g.l)};color:${gradeFg(g.l)}">${g.l}</div>
        <button onclick="showPerson('${esc(x.name)}','${esc(x.branch)}')">ดูประวัติ</button>
      </div>`;
    }).join('')}
  </div>`;
}

async function showPerson(name,branch){
  const all=await loadAll();
  const list=all.filter(r=>r.housekeeper===name&&r.branch===branch).sort((a,b)=>a.finishedAt-b.finishedAt);
  if(list.length===0)return;
  const avg=(list.reduce((s,r)=>s+r.pct,0)/list.length).toFixed(1);
  const best=Math.max(...list.map(r=>r.pct));
  const passed=list.filter(r=>r.pct>=CONFIG.PASS).length;
  
  // trend chart bars
  const max=Math.max(...list.map(r=>r.pct),100);
  
  // cat avg ของคนนี้
  const catAgg={};
  list.forEach(r=>Object.entries(r.catStats).forEach(([k,s])=>{
    if(!catAgg[k])catAgg[k]={pts:0,maxPts:0};
    catAgg[k].pts+=s.pts;catAgg[k].maxPts+=s.maxPts;
  }));
  
  // first/last comparison
  const first=list[0],last=list[list.length-1];
  const improvement=list.length>=2?(last.pct-first.pct).toFixed(1):null;
  
  const m=document.createElement('div');
  m.id='modal-host';
  m.innerHTML=`
  <div class="detail-modal" onclick="if(event.target===this)closeDetail()">
    <div class="box">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:12px">
        <div>
          <h2 style="font-size:24px">${esc(name)}</h2>
          <p class="small">${esc(branch)} · สอบทั้งหมด ${list.length} ครั้ง</p>
        </div>
        <button class="btn btn-secondary" onclick="closeDetail()">ปิด ✕</button>
      </div>
      
      <div class="metric-grid">
        <div class="metric"><div class="lbl">เฉลี่ย</div><div class="val">${avg}%</div></div>
        <div class="metric"><div class="lbl">สูงสุด</div><div class="val" style="color:var(--right)">${best.toFixed(1)}%</div></div>
        <div class="metric"><div class="lbl">ผ่านเกณฑ์</div><div class="val">${passed}<span style="font-size:18px;color:var(--neutral)">/${list.length}</span></div></div>
        ${improvement!==null?`<div class="metric"><div class="lbl">พัฒนาการ</div><div class="val" style="color:${improvement>=0?'var(--right)':'var(--wrong)'}">${improvement>=0?'+':''}${improvement}<span style="font-size:18px">%</span></div><div class="sub">ครั้งแรก vs ล่าสุด</div></div>`:''}
      </div>

      ${list.length>=2?`
      <div class="trend-card">
        <h3>📈 พัฒนาการคะแนน (${list.length} ครั้ง)</h3>
        <div class="trend-chart">
          ${list.map((r,i)=>{
            const h=(r.pct/max)*100;
            const pass=r.pct>=CONFIG.PASS;
            return `<div class="trend-bar ${pass?'pass':''}" style="height:${h}%" title="${fmtDate(r.finishedAt)}: ${r.pct}%"><div class="lbl">${r.pct}</div></div>`;
          }).join('')}
        </div>
        <div class="trend-axis">
          <span>${fmtDateShort(list[0].finishedAt)}</span>
          <span class="small">เกณฑ์ผ่าน 70%</span>
          <span>${fmtDateShort(list[list.length-1].finishedAt)}</span>
        </div>
      </div>`:''}
      
      <h3 style="margin:24px 0 12px;font-size:16px;letter-spacing:.05em;text-transform:uppercase;color:var(--neutral);border-bottom:2px solid var(--ink);padding-bottom:6px">คะแนนเฉลี่ยรายหมวด</h3>
      <div class="metric-grid">
        ${Object.entries(catAgg).map(([cat,s])=>{const p=Math.round((s.pts/s.maxPts)*100);const col=p>=75?'var(--sage)':p>=60?'var(--gold)':'var(--warm)';return `<div class="metric"><div class="lbl">${esc(cat)}</div><div class="val" style="color:${col}">${p}%</div></div>`}).join('')}
      </div>
      
      <h3 style="margin:24px 0 12px;font-size:16px;letter-spacing:.05em;text-transform:uppercase;color:var(--neutral);border-bottom:2px solid var(--ink);padding-bottom:6px">รายการสอบ (ล่าสุดก่อน)</h3>
      <div class="history-list">
        ${list.slice().reverse().map(r=>{
          const g=calcGrade(r.pct),pass=r.pct>=CONFIG.PASS;
          return `<div class="history-item">
            <div>
              <div class="date" style="font-size:14px;color:var(--ink);font-weight:600">${fmtDate(r.finishedAt)}</div>
              <div class="date">ใช้เวลา ${fmtDur(r.duration)} · ตอบถูก ${r.correctCount}/${r.totalCount}</div>
            </div>
            <div class="score" style="color:${pass?'var(--right)':'var(--wrong)'}">${r.totalScore}</div>
            <div class="grade grade-${g.l}" style="background:${gradeBg(g.l)};color:${gradeFg(g.l)}">${g.l}</div>
            <button onclick="closeDetail();setTimeout(()=>showDetail('${r.id}'),100)">ดู</button>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
  document.body.appendChild(m);
}

// === NAV ===
function goHome(){state.page='home';render()}
function goStart(){state.page='exam-start';render()}
function goLogin(){state.page='owner-login';render()}

// === BG ===
function makeBubbles(){
  const c=$('bubbles');
  for(let i=0;i<8;i++){
    const b=document.createElement('div');
    b.className='bubble';
    const s=20+Math.random()*40;
    b.style.width=s+'px';b.style.height=s+'px';
    b.style.left=(Math.random()*100)+'%';
    b.style.animationDelay=(Math.random()*8)+'s';
    b.style.animationDuration=(6+Math.random()*6)+'s';
    c.appendChild(b);
  }
}

makeBubbles();
render();
</script>
</body>
